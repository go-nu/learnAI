<!DOCTYPE html>
<html lang="ko" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG챗봇 V1.0 · 로그인</title>

  <!-- Nanum Gothic Font -->
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- SweetAlert2 -->
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { nanum: ['"Nanum Gothic"', 'sans-serif'] },
          colors: {
            primary: '#6C63FF',
            accent:  '#4F46E5',
          },
        },
      },
    };
  </script>

  <style>
    * { font-family: 'Nanum Gothic', sans-serif; box-sizing: border-box; }

    /* ═══════════════════════════════════════════
       LIGHT MODE
    ═══════════════════════════════════════════ */
    html.light body {
      background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 35%, #2563eb 60%, #3b82f6 85%, #60a5fa 100%);
      min-height: 100vh;
    }

    /* 카드 */
    html.light .login-card      { background: #ffffff; box-shadow: 0 25px 60px rgba(0,0,0,.2); }
    html.light .card-title      { color: #1E1B4B; }
    html.light .card-sub        { color: #9CA3AF; }

    /* 입력 필드 */
    html.light .input-wrap      { background: #F5F6FF; border: 1px solid #E5E7EB; }
    html.light .input-wrap:focus-within { border-color: #6C63FF; background: #ffffff; box-shadow: 0 0 0 3px rgba(108,99,255,.12); }
    html.light .input-field     { color: #1E1B4B; background: transparent; }
    html.light .input-field::placeholder { color: #9CA3AF; }
    html.light .input-icon      { color: #9CA3AF; }
    html.light .input-wrap:focus-within .input-icon { color: #6C63FF; }

    /* 레이블 */
    html.light .field-label     { color: #374151; }

    /* 체크박스 */
    html.light .remember-txt    { color: #6B7280; }

    /* 링크 */
    html.light .link-txt        { color: #6C63FF; }
    html.light .link-txt:hover  { color: #4F46E5; }

    /* 구분선 */
    html.light .divider-line    { border-color: #E5E7EB; }
    html.light .divider-txt     { color: #9CA3AF; background: #ffffff; }

    /* 소셜 버튼 */
    html.light .social-btn      { background: #F5F6FF; border: 1px solid #E5E7EB; color: #374151; }
    html.light .social-btn:hover{ background: #EEF0FF; border-color: #C7D2FE; }

    /* 하단 텍스트 */
    html.light .bottom-txt      { color: rgba(255,255,255,.7); }
    html.light .bottom-link     { color: #ffffff; }

    /* 배지 */
    html.light .badge-info      { background: #EEF0FF; color: #4F46E5; }

    /* 에러 메시지 */
    html.light .error-msg       { color: #DC2626; background: #FEE2E2; border: 1px solid #FECACA; }
    html.light .success-msg     { color: #15803D; background: #DCFCE7; border: 1px solid #BBF7D0; }

    /* ═══════════════════════════════════════════
       DARK MODE
    ═══════════════════════════════════════════ */
    html.dark body {
      background: linear-gradient(135deg, #0c1a3a 0%, #0f2460 35%, #1a3a7a 60%, #1e4d96 85%, #1d6bbb 100%);
      min-height: 100vh;
    }

    html.dark .login-card       { background: #1a1f35; box-shadow: 0 25px 60px rgba(0,0,0,.5); }
    html.dark .card-title       { color: #e2e8f0; }
    html.dark .card-sub         { color: #64748b; }

    html.dark .input-wrap       { background: #111827; border: 1px solid #2d3561; }
    html.dark .input-wrap:focus-within { border-color: #818cf8; background: #111827; box-shadow: 0 0 0 3px rgba(129,140,248,.15); }
    html.dark .input-field      { color: #e2e8f0; background: transparent; }
    html.dark .input-field::placeholder { color: #475569; }
    html.dark .input-icon       { color: #475569; }
    html.dark .input-wrap:focus-within .input-icon { color: #818cf8; }

    html.dark .field-label      { color: #cbd5e1; }
    html.dark .remember-txt     { color: #64748b; }
    html.dark .link-txt         { color: #818cf8; }
    html.dark .link-txt:hover   { color: #a5b4fc; }

    html.dark .divider-line     { border-color: #2d3561; }
    html.dark .divider-txt      { color: #64748b; background: #1a1f35; }

    html.dark .social-btn       { background: #111827; border: 1px solid #2d3561; color: #cbd5e1; }
    html.dark .social-btn:hover { background: #1e2a4a; border-color: #4F46E5; }

    html.dark .bottom-txt       { color: rgba(255,255,255,.5); }
    html.dark .bottom-link      { color: rgba(255,255,255,.85); }

    html.dark .badge-info       { background: #1e2a4a; color: #818cf8; }

    html.dark .error-msg        { color: #FCA5A5; background: #7F1D1D; border: 1px solid #991B1B; }
    html.dark .success-msg      { color: #4ADE80; background: #14532D; border: 1px solid #166534; }

    /* ═══════════════════════════════════════════
       SHARED
    ═══════════════════════════════════════════ */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #6C63FF55; border-radius: 10px; }

    /* 애니메이션 */
    @keyframes fadeDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes float    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes pulse-ring {
      0%   { transform:scale(.95); box-shadow:0 0 0 0 rgba(108,99,255,.5); }
      70%  { transform:scale(1);   box-shadow:0 0 0 12px rgba(108,99,255,0); }
      100% { transform:scale(.95); box-shadow:0 0 0 0 rgba(108,99,255,0); }
    }

    .login-card  { border-radius: 20px; animation: fadeDown .4s ease; }
    .logo-ring   { animation: pulse-ring 2.5s infinite; }
    .float-badge { animation: float 3s ease-in-out infinite; }

    /* 버튼 */
    .btn-login {
      background: linear-gradient(135deg, #6C63FF 0%, #4F46E5 100%);
      transition: opacity .2s, transform .1s, box-shadow .2s;
      box-shadow: 0 4px 15px rgba(108,99,255,.35);
    }
    .btn-login:hover:not(:disabled) { opacity:.92; transform:translateY(-1px); box-shadow:0 6px 20px rgba(108,99,255,.45); }
    .btn-login:active:not(:disabled) { transform:translateY(0); }
    .btn-login:disabled { opacity:.5; cursor:not-allowed; }

    .social-btn  { border-radius: 12px; transition: all .15s; font-size: 13px; font-weight: 700; }

    /* 입력 래퍼 */
    .input-wrap  { border-radius: 12px; transition: all .2s; display:flex; align-items:center; gap:10px; padding:0 14px; height:48px; }
    .input-field { flex:1; outline:none; font-size:14px; height:100%; }

    /* 비밀번호 토글 버튼 */
    .pw-toggle   { background:none; border:none; cursor:pointer; padding:0; display:flex; align-items:center; transition:opacity .15s; }
    .pw-toggle:hover { opacity:.7; }

    /* 체크박스 */
    input[type="checkbox"] { accent-color: #6C63FF; width:16px; height:16px; cursor:pointer; }

    /* 테마 토글 */
    #themeBtn    { transition: transform .4s; }
    #themeBtn:hover { transform: rotate(20deg); }
    .sun-icon, .moon-icon { transition: opacity .3s, transform .3s; position:absolute; }
    html.dark  .sun-icon  { opacity:1; transform:rotate(0deg); }
    html.dark  .moon-icon { opacity:0; transform:rotate(-90deg); }
    html.light .sun-icon  { opacity:0; transform:rotate(90deg); }
    html.light .moon-icon { opacity:1; transform:rotate(0deg); }

    /* 강도 바 */
    .strength-bar { height:4px; border-radius:999px; transition:width .3s, background .3s; }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

  <!-- 배경 블롭 -->
  <div class="pointer-events-none fixed inset-0 overflow-hidden">
    <div class="absolute -top-32 -left-32 w-96 h-96 rounded-full opacity-20" style="background:radial-gradient(circle,#6C63FF,transparent 70%)"></div>
    <div class="absolute -bottom-32 -right-32 w-96 h-96 rounded-full opacity-20" style="background:radial-gradient(circle,#3B82F6,transparent 70%)"></div>
  </div>

  <!-- 테마 토글 (우상단) -->
  <button id="themeBtn" onclick="toggleTheme()"
    class="fixed top-4 right-4 w-9 h-9 rounded-xl flex items-center justify-center relative"
    style="background:rgba(255,255,255,.15);backdrop-filter:blur(8px);" title="테마 전환">
    <svg class="sun-icon w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/>
    </svg>
    <svg class="moon-icon w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
    </svg>
  </button>

  <!-- ═══════════════ LOGIN CARD ═══════════════ -->
  <div class="login-card w-full max-w-md px-8 py-9 transition-colors duration-300 relative">

    <!-- 플로팅 배지 -->
    <div class="float-badge absolute -top-3 right-6">
      <span class="badge-info text-xs font-bold px-3 py-1 rounded-full transition-colors duration-300">RAG v1.0</span>
    </div>

    <!-- 로고 & 제목 -->
    <div class="flex flex-col items-center mb-8">
      <div class="logo-ring w-16 h-16 rounded-2xl flex items-center justify-center mb-4"
           style="background:linear-gradient(135deg,#6C63FF,#4F46E5)">
        <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-extrabold card-title transition-colors duration-300">RAG챗봇 V1.0</h1>
      <p class="text-sm mt-1 card-sub transition-colors duration-300">관리자 대시보드에 오신 것을 환영합니다</p>
    </div>

    <!-- 인라인 알림 영역 -->
    <div id="inlineAlert" class="hidden rounded-xl px-4 py-3 text-sm font-bold mb-4 transition-all duration-300"></div>

    <!-- ─── 로그인 폼 ─── -->
    <form id="loginForm" onsubmit="handleLogin(event)" novalidate class="space-y-4">

      <!-- 아이디 -->
      <div>
        <label class="field-label text-xs font-bold block mb-1.5 transition-colors duration-300">아이디 (이메일)</label>
        <div class="input-wrap transition-all duration-200">
          <svg class="input-icon w-5 h-5 flex-shrink-0 transition-colors duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          <input
            id="emailInput" type="email"
            placeholder="admin@example.com"
            class="input-field transition-colors duration-300"
            autocomplete="email"
            oninput="clearAlert()"
          />
        </div>
      </div>

      <!-- 비밀번호 -->
      <div>
        <div class="flex items-center justify-between mb-1.5">
          <label class="field-label text-xs font-bold transition-colors duration-300">비밀번호</label>
          <button type="button" onclick="showForgotPw()" class="link-txt text-xs transition-colors duration-300">비밀번호 찾기</button>
        </div>
        <div class="input-wrap transition-all duration-200">
          <svg class="input-icon w-5 h-5 flex-shrink-0 transition-colors duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          <input
            id="pwInput" type="password"
            placeholder="비밀번호를 입력하세요"
            class="input-field transition-colors duration-300"
            autocomplete="current-password"
            oninput="clearAlert()"
          />
          <button type="button" class="pw-toggle input-icon transition-colors duration-300" onclick="togglePw()" title="표시/숨기기">
            <svg id="eyeIcon" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            <svg id="eyeOffIcon" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- 기억하기 -->
      <div class="flex items-center justify-between">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" id="rememberMe" />
          <span class="remember-txt text-xs transition-colors duration-300">로그인 상태 유지</span>
        </label>
        <span class="badge-info text-xs px-2 py-0.5 rounded-full transition-colors duration-300">관리자 전용</span>
      </div>

      <!-- 로그인 버튼 -->
      <button type="submit" id="loginBtn" class="btn-login w-full text-white font-extrabold py-3 rounded-xl text-sm flex items-center justify-center gap-2 mt-2">
        <svg id="loginBtnIcon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
        </svg>
        <span id="loginBtnText">로그인</span>
      </button>
    </form>

    <!-- ─── 구분선 ─── -->
    <div class="flex items-center gap-3 my-5">
      <hr class="flex-1 divider-line transition-colors duration-300" />
      <span class="divider-txt text-xs px-2 transition-colors duration-300">또는</span>
      <hr class="flex-1 divider-line transition-colors duration-300" />
    </div>

    <!-- ─── 소셜 로그인 ─── -->
    <div class="grid grid-cols-2 gap-3">
      <button onclick="socialLogin('Google')" class="social-btn flex items-center justify-center gap-2 py-2.5 px-3 transition-colors duration-300">
        <!-- Google SVG -->
        <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google
      </button>
      <button onclick="socialLogin('GitHub')" class="social-btn flex items-center justify-center gap-2 py-2.5 px-3 transition-colors duration-300">
        <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        GitHub
      </button>
    </div>

    <!-- ─── 하단 안내 ─── -->
    <p class="text-center text-xs mt-6 bottom-txt">
      계정이 없으신가요?
      <button onclick="showRegister()" class="bottom-link font-bold underline ml-1 bg-transparent border-none cursor-pointer">관리자에게 문의</button>
    </p>
  </div>

  <!-- 하단 버전 -->
  <p class="fixed bottom-4 left-1/2 -translate-x-1/2 text-xs bottom-txt whitespace-nowrap">
    RAG챗봇 V1.0 RAG v1.0 · Powered by Claude AI &amp; BGE-M3
  </p>

  <script>
  // ════════════════════════════════════════════
  //  THEME
  // ════════════════════════════════════════════
  let isDark = false;

  function toggleTheme() {
    isDark = !isDark;
    const html = document.documentElement;
    html.classList.toggle('dark', isDark);
    html.classList.toggle('light', !isDark);
    Swal.fire({
      icon:'info',
      title: isDark ? '🌙 다크 모드' : '☀️ 라이트 모드',
      timer:1200, showConfirmButton:false, toast:true, position:'top-end'
    });
  }

  // ════════════════════════════════════════════
  //  PASSWORD TOGGLE
  // ════════════════════════════════════════════
  let pwVisible = false;

  function togglePw() {
    pwVisible = !pwVisible;
    const input = document.getElementById('pwInput');
    input.type = pwVisible ? 'text' : 'password';
    document.getElementById('eyeIcon').classList.toggle('hidden', pwVisible);
    document.getElementById('eyeOffIcon').classList.toggle('hidden', !pwVisible);
  }

  // ════════════════════════════════════════════
  //  INLINE ALERT
  // ════════════════════════════════════════════
  function showAlert(msg, type) {
    const el = document.getElementById('inlineAlert');
    el.className = `${type === 'error' ? 'error-msg' : 'success-msg'} rounded-xl px-4 py-3 text-sm font-bold mb-4 transition-all duration-300 flex items-center gap-2`;
    el.innerHTML = `
      <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        ${type === 'error'
          ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>'
          : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>'}
      </svg>
      ${msg}`;
    el.classList.remove('hidden');
  }

  function clearAlert() {
    document.getElementById('inlineAlert').classList.add('hidden');
  }

  // ════════════════════════════════════════════
  //  CSRF 쿠키 읽기
  // ════════════════════════════════════════════
  function getCookie(name) {
    let value = null;
    if (document.cookie) {
      for (const part of document.cookie.split(';')) {
        const [k, v] = part.trim().split('=');
        if (k === name) { value = decodeURIComponent(v); break; }
      }
    }
    return value;
  }

  // ════════════════════════════════════════════
  //  LOGIN (Django Auth 연동)
  // ════════════════════════════════════════════
  let loginAttempts = 0;

  async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('emailInput').value.trim();
    const pw    = document.getElementById('pwInput').value;

    // ── 클라이언트 유효성 검사 ──
    if (!email) {
      showAlert('이메일을 입력해 주세요.', 'error');
      document.getElementById('emailInput').focus();
      return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showAlert('올바른 이메일 형식이 아닙니다.', 'error');
      document.getElementById('emailInput').focus();
      return;
    }
    if (!pw) {
      showAlert('비밀번호를 입력해 주세요.', 'error');
      document.getElementById('pwInput').focus();
      return;
    }
    if (pw.length < 4) {
      showAlert('비밀번호가 너무 짧습니다.', 'error');
      return;
    }

    setLoadingState(true);

    try {
      const resp = await fetch('/chatbot/login/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': getCookie('csrftoken'),
        },
        body: JSON.stringify({ email, password: pw }),
      });

      const data = await resp.json();
      setLoadingState(false);

      if (data.success) {
        showAlert('로그인 성공! 이동 중...', 'success');
        Swal.fire({
          icon: 'success',
          title: '로그인 성공',
          text: `${email} 님, 환영합니다!`,
          timer: 1400,
          showConfirmButton: false,
          timerProgressBar: true,
        }).then(() => {
          window.location.href = data.redirect;
        });
      } else {
        loginAttempts++;
        document.getElementById('pwInput').value = '';
        document.getElementById('pwInput').focus();

        if (loginAttempts >= 5) {
          Swal.fire({
            icon: 'error',
            title: '로그인 시도 초과',
            html: `<p style="font-family:'Nanum Gothic',sans-serif;font-size:14px">
              로그인 시도가 <strong>${loginAttempts}회</strong> 실패했습니다.<br>
              계속 실패 시 계정이 잠길 수 있습니다.</p>`,
            confirmButtonColor: '#6C63FF',
            confirmButtonText: '확인',
          });
        } else {
          showAlert(`${data.error} (${loginAttempts}/5)`, 'error');
        }
      }
    } catch (err) {
      setLoadingState(false);
      Swal.fire({
        icon: 'error',
        title: '서버 연결 오류',
        text: '잠시 후 다시 시도해 주세요.',
        confirmButtonColor: '#6C63FF',
      });
    }
  }

  function setLoadingState(loading) {
    const btn  = document.getElementById('loginBtn');
    const icon = document.getElementById('loginBtnIcon');
    const txt  = document.getElementById('loginBtnText');
    btn.disabled = loading;
    if (loading) {
      icon.innerHTML = `<circle cx="12" cy="12" r="10" stroke="white" stroke-width="3" fill="none" stroke-dasharray="60" stroke-dashoffset="20" style="animation:spin 1s linear infinite"></circle>`;
      icon.style.animation = 'spin 1s linear infinite';
      txt.textContent = '로그인 중...';
    } else {
      icon.style.animation = '';
      icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>`;
      txt.textContent = '로그인';
    }
  }

  // ════════════════════════════════════════════
  //  FORGOT PASSWORD
  // ════════════════════════════════════════════
  function showForgotPw() {
    Swal.fire({
      title:'비밀번호 찾기',
      html:`<div style="text-align:left;font-family:'Nanum Gothic',sans-serif">
        <label style="font-size:13px;font-weight:700;display:block;margin-bottom:6px">가입한 이메일 주소</label>
        <input id="swalEmail" type="email" placeholder="이메일을 입력하세요"
          style="width:100%;padding:10px 14px;border:1px solid #E5E7EB;border-radius:10px;font-family:'Nanum Gothic',sans-serif;font-size:14px;outline:none"
          onfocus="this.style.borderColor='#6C63FF'" onblur="this.style.borderColor='#E5E7EB'" />
      </div>`,
      confirmButtonColor:'#6C63FF',
      confirmButtonText:'재설정 링크 발송',
      showCancelButton:true,
      cancelButtonText:'취소',
      preConfirm: () => {
        const val = document.getElementById('swalEmail').value.trim();
        if (!val || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) {
          Swal.showValidationMessage('올바른 이메일 주소를 입력해 주세요.');
          return false;
        }
        return val;
      }
    }).then(r => {
      if (r.isConfirmed) {
        Swal.fire({
          icon:'success',
          title:'메일 발송 완료',
          html:`<p style="font-family:'Nanum Gothic',sans-serif;font-size:14px">
            <strong>${r.value}</strong> 으로 비밀번호 재설정 링크를 보냈습니다.<br>
            메일함을 확인해 주세요.</p>`,
          confirmButtonColor:'#6C63FF'
        });
      }
    });
  }

  // ════════════════════════════════════════════
  //  SOCIAL LOGIN
  // ════════════════════════════════════════════
  function socialLogin(provider) {
    Swal.fire({
      icon:'info',
      title:`${provider} 로그인`,
      text:`${provider} OAuth 연동은 준비 중입니다. 이메일/비밀번호로 로그인해 주세요.`,
      confirmButtonColor:'#6C63FF',
      confirmButtonText:'확인'
    });
  }

  // ════════════════════════════════════════════
  //  REGISTER (관리자 문의)
  // ════════════════════════════════════════════
  function showRegister() {
    Swal.fire({
      title:'관리자 계정 문의',
      html:`<div style="text-align:left;font-family:'Nanum Gothic',sans-serif;font-size:14px">
        <p>관리자 계정은 시스템 담당자에게만 발급됩니다.</p>
        <br>
        <p><strong>담당자 연락처</strong></p>
        <p>📧 admin@company.com</p>
        <p>📞 02-1234-5678</p>
      </div>`,
      confirmButtonColor:'#6C63FF',
      confirmButtonText:'확인'
    });
  }

  // ════════════════════════════════════════════
  //  SPIN KEYFRAME (동적 추가)
  // ════════════════════════════════════════════
  const spinStyle = document.createElement('style');
  spinStyle.textContent = '@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }';
  document.head.appendChild(spinStyle);

  // ════════════════════════════════════════════
  //  ENTER KEY
  // ════════════════════════════════════════════
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey && document.activeElement.tagName !== 'BUTTON') {
      document.getElementById('loginForm').dispatchEvent(new Event('submit'));
    }
  });
  </script>
</body>
</html>
