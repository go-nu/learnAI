<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>관리자 로그인 — FACE·GATE</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Geist', system-ui, sans-serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .input-field {
    width: 100%; padding: 12px 16px;
    border: 1px solid #334155; border-radius: 10px;
    background: #1e293b; color: #f1f5f9; font-size: 15px;
    outline: none; transition: border-color 0.15s;
  }
  .input-field:focus {
    border-color: #d94f1e;
    box-shadow: 0 0 0 3px rgba(217,79,30,0.18);
  }
  .input-field::placeholder { color: #475569; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp 0.5s ease forwards; }

  /* grid dot background */
  .dot-bg {
    background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 28px 28px;
  }
</style>
</head>
<body class="min-h-screen flex items-center justify-center dot-bg" style="background: #0f172a;">

<div class="w-full max-w-md px-6 fade-up">

  <!-- Logo block -->
  <div class="text-center mb-10">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4" style="background: #d94f1e;">
      <svg viewBox="0 0 24 24" class="w-9 h-9 text-white" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        <circle cx="19" cy="5" r="3" fill="#d94f1e" stroke="white" stroke-width="1.5"/>
        <path d="M18 5h2M19 4v2" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <h1 class="text-white text-3xl font-bold leading-tight">FACE·GATE</h1>
    <p class="mono text-[11px] text-slate-400 uppercase tracking-[0.25em] mt-1">Admin Console — 관리자 로그인</p>
  </div>

  <!-- Card -->
  <div class="rounded-2xl p-8" style="background: #1e293b; border: 1px solid #334155;">

    {% if error %}
    <div class="mb-5 px-4 py-3 rounded-lg flex items-center gap-3 text-sm"
         style="background: rgba(217,79,30,0.15); border: 1px solid rgba(217,79,30,0.4); color: #f9dcc9;">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r="0.5" fill="currentColor"/>
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="{% url 'bo_login' %}">
      {% csrf_token %}

      <div class="mb-5">
        <label class="block text-sm font-medium text-slate-300 mb-2">아이디</label>
        <input type="text" name="username" class="input-field"
               placeholder="관리자 아이디 입력"
               value="{{ request.POST.username|default:'' }}"
               autocomplete="username" required>
      </div>

      <div class="mb-6">
        <label class="block text-sm font-medium text-slate-300 mb-2">비밀번호</label>
        <input type="password" name="password" class="input-field"
               placeholder="비밀번호 입력"
               autocomplete="current-password" required>
      </div>

      <button type="submit" class="w-full py-3 rounded-xl font-semibold text-white text-[15px] transition-all hover:opacity-90 active:scale-[0.98]"
              style="background: #d94f1e;">
        로그인
      </button>
    </form>

    <div class="mt-6 pt-5 border-t border-slate-700 text-center">
      <p class="mono text-[11px] text-slate-500 uppercase tracking-widest">
        관리자 계정이 없으시면 시스템 담당자에게 문의하세요
      </p>
    </div>
  </div>

  <!-- Footer -->
  <p class="text-center mono text-[10px] text-slate-600 uppercase tracking-widest mt-8">
    FACE·GATE v3.2 · Secured Admin Area
  </p>
</div>

{% if error %}
<script>
  document.addEventListener('DOMContentLoaded', () => {
    Swal.fire({
      icon: 'error',
      title: '로그인 실패',
      text: '{{ error }}',
      background: '#1e293b',
      color: '#f1f5f9',
      confirmButtonColor: '#d94f1e',
      confirmButtonText: '확인',
      showClass: { popup: 'animate__animated animate__fadeInDown' },
    });
  });
</script>
{% endif %}

</body>
</html>
