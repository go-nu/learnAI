    { id: "guide",  label: "이의제기 가이드", panel: <GuidePanel /> },
  ];
  const [active, setActive] = useState(tabs[0].id);
  const current = tabs.find((t) => t.id === active);

  return (
    <div className="bg-white border border-gray-200 rounded-xl overflow-hidden">
      <div className="flex border-b border-gray-200 overflow-x-auto">
        {tabs.map((t) => {
          const on = active === t.id;
          return (
            <button
              key={t.id} onClick={() => setActive(t.id)}
              className={[
                "px-5 py-3.5 text-sm font-bold transition border-b-2 -mb-px whitespace-nowrap",
                on
                  ? "border-[#1B4FD8] text-[#1B4FD8] bg-blue-50/40"
                  : "border-transparent text-slate-500 hover:text-slate-900",
              ].join(" ")}
            >
              {t.label}
            </button>
          );
        })}
      </div>
      <div className="p-6">{current.panel}</div>
    </div>
  );
}
