    position: absolute;
    width: 100%;

    appearance: none;
    pointer-events: auto;
    width: 18px; height: 18px;

    border: 3px solid #1B4FD8;

    border-radius: 9999px;

    from { opacity: 0; transform: scale(0.92) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }

  @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
  .modal-in { animation: modalIn 0.18s ease-out both; }
  .overlay-in { animation: overlayIn 0.18s ease-out both; }
</style>

// ---------- Search header ----------
function SearchHeader({ query, onQuery }) {

}

// ---------- Filter sidebar ----------
function FilterSidebar({ types, onToggleType, range, setRange, onReset }) {
  const typeOptions = [
    { id: "straight",  label: "직진/직진",       count: 38 },
    { id: "left",      label: "직진/좌회전",     count: 27 },
    { id: "lane",      label: "차선 변경",       count: 22 },
    { id: "rear",      label: "추돌",            count: 19 },
    { id: "park",      label: "주차장",          count: 14 },
    { id: "ped",       label: "보행자",          count: 21 },
    { id: "signal",    label: "신호 위반",       count: 16 },
  ];
  const [minP, maxP] = range;

  return (
    <aside className="w-64 shrink-0 space-y-6">
      <div className="bg-white border border-gray-200 rounded-xl p-5">
        <div className="flex items-center justify-between mb-4">
          <h3 className="font-extrabold text-slate-900">필터</h3>
          <button onClick={onReset} className="text-xs text-[#1B4FD8] hover:underline">
            초기화
          </button>
        </div>

        {/* Accident type */}
        <div className="mb-5">
          <p className="text-xs font-bold text-slate-400 tracking-widest uppercase mb-3">사고 유형</p>
          <ul className="space-y-2">
            {typeOptions.map((t) => {
              const checked = types.includes(t.id);
              return (
                <li key={t.id}>
                  <label className="flex items-center gap-2.5 cursor-pointer group">
                    <input
                      type="checkbox" checked={checked}
                      onChange={() => onToggleType(t.id)}
                      className="w-4 h-4 rounded accent-[#1B4FD8] cursor-pointer"
                    />
                    <span className={[
                      "text-sm flex-1",
                      checked ? "text-slate-900 font-bold" : "text-slate-600 group-hover:text-slate-900",
                    ].join(" ")}>{t.label}</span>
                    <span className="text-[11px] font-mono text-slate-400">{t.count}</span>
                  </label>
                </li>
              );
            })}
          </ul>
        </div>

        {/* Fault range */}
        <div>
          <p className="text-xs font-bold text-slate-400 tracking-widest uppercase mb-3">과실 비율 범위</p>
          <div className="flex items-center justify-between text-xs mb-3">
            <span className="font-mono text-slate-600">{minP}%</span>
            <span className="text-slate-300">—</span>
            <span className="font-mono text-slate-600">{maxP}%</span>
          </div>

          {/* dual slider */}
          <div className="relative h-6 mb-2">
            <div className="absolute top-1/2 -translate-y-1/2 w-full h-1.5 rounded-full bg-slate-200" />
            <div
              className="absolute top-1/2 -translate-y-1/2 h-1.5 rounded-full bg-[#1B4FD8]"
              style={{ left: `${minP}%`, right: `${100 - maxP}%` }}
            />
            <input
              type="range" className="dual" min="0" max="100" step="5"
              value={minP}
              onChange={(e) => setRange([Math.min(+e.target.value, maxP - 5), maxP])}
            />
            <input
              type="range" className="dual" min="0" max="100" step="5"
              value={maxP}
              onChange={(e) => setRange([minP, Math.max(+e.target.value, minP + 5)])}
            />
          </div>

          <div className="flex justify-between text-[10px] font-mono text-slate-400">
            <span>0%</span><span>50%</span><span>100%</span>
          </div>
        </div>
      </div>
    </aside>
  );
}

// ---------- Modal ----------
function CaseModal({ case: c, onClose }) {
  useEffect(() => {
    const onKey = (e) => e.key === "Escape" && onClose();
    window.addEventListener("keydown", onKey);
    document.body.style.overflow = "hidden";
    return () => {
      window.removeEventListener("keydown", onKey);
      document.body.style.overflow = "";
    };
  }, [onClose]);

  if (!c) return null;

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
      <div
        className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm overlay-in"
        onClick={onClose}
      />
      <div className="relative w-full max-w-lg bg-white rounded-2xl border border-gray-200 modal-in
                      shadow-[0_20px_60px_-15px_rgba(15,23,42,0.25)] overflow-hidden">
        {/* close */}
        <button
          onClick={onClose}
          className="absolute top-4 right-4 w-9 h-9 rounded-lg text-slate-500 hover:bg-slate-100 flex items-center justify-center"
          aria-label="닫기"
        >
          <IconX className="w-5 h-5" />
        </button>

        {/* header */}
        <div className="px-7 pt-7 pb-5">
          <div className="flex items-center gap-2 mb-3">
            <span className="text-[10px] font-mono bg-slate-100 text-slate-600 rounded px-2 py-0.5">
              {c.code}
            </span>
            <span className="text-[11px] font-bold text-[#1B4FD8] bg-blue-50 rounded-full px-2 py-0.5">
              {c.type}
            </span>
          </div>
          <h2 className="text-xl font-extrabold text-slate-900">{c.title}</h2>
          <p className="text-sm text-slate-600 mt-2 leading-relaxed">{c.summary}</p>
        </div>

        {/* fault ratio panel */}
        <div className="px-7 py-5 bg-blue-50/40 border-y border-blue-100">
          <p className="text-[10px] font-mono text-[#1B4FD8] tracking-widest uppercase mb-1.5">
            참고 과실 비율
          </p>
          <div className="flex items-end gap-3">
            <div className="flex items-baseline gap-1">
              <span className="text-4xl font-extrabold text-[#1B4FD8] tabular-nums leading-none">
                {c.range[0]}
              </span>
              <span className="text-xl font-bold text-[#1B4FD8]">~</span>
              <span className="text-4xl font-extrabold text-[#1B4FD8] tabular-nums leading-none">
                {c.range[1]}
              </span>
              <span className="text-base font-bold text-[#1B4FD8] ml-0.5">%</span>
            </div>
            <span className="text-xs text-slate-500 mb-0.5">
              기본값 <span className="font-mono text-slate-700">{c.base}</span>

            <IconBook className="w-4 h-4" /> 관련 법률 조항
          </div>
          <p className="text-sm text-slate-700 leading-relaxed">{c.law}</p>
        </div>

        {/* footer */}
        <div className="px-7 py-4 bg-slate-50 border-t border-gray-200 flex items-center justify-between gap-3">
          <a
            href="https://accident.knia.or.kr" target="_blank" rel="noopener noreferrer"
            className="inline-flex items-center gap-1.5 text-sm font-medium text-[#1B4FD8] hover:underline"

            <IconLink className="w-4 h-4" /> GIAK 원문 보기

          <button
            onClick={onClose}
            className="bg-[#1B4FD8] text-white rounded-lg font-medium px-5 py-2 text-sm hover:opacity-90"
          >

// ---------- App ----------
function App() {
  const [query, setQuery] = useState("");
  const [types, setTypes] = useState([]);
  const [range, setRange] = useState([0, 100]);
  const [active, setActive] = useState(null);

  const toggleType = (id) =>
    setTypes((prev) => prev.includes(id) ? prev.filter((x) => x !== id) : [...prev, id]);

  const reset = () => {
    setTypes([]); setRange([0, 100]); setQuery("");
  };

  const results = useMemo(() => {
    return CASES.filter((c) => {
      const inType = types.length === 0 || types.includes(c.typeId);
      const inRange = c.range[0] >= range[0] && c.range[1] <= range[1];
      const inQuery = !query ||
        (c.title + c.summary + c.type + c.law).toLowerCase().includes(query.toLowerCase());
      return inType && inRange && inQuery;
    });
  }, [types, range, query]);

  return (
    <div className="min-h-screen flex flex-col">
      <Navbar />

      <main className="flex-1">
        <div className="max-w-6xl mx-auto px-6 py-10 space-y-8">
          <SearchHeader query={query} onQuery={setQuery} />

          <div className="flex gap-6">
            <FilterSidebar
              types={types} onToggleType={toggleType}
              range={range} setRange={setRange} onReset={reset}
            />

            <div className="flex-1 min-w-0 space-y-4">
              {/* Result header */}
              <div className="flex items-center justify-between flex-wrap gap-2">
                <p className="text-sm text-slate-600">
                  총 <span className="font-extrabold text-slate-900">{results.length}</span>개 사례
                  {(types.length > 0 || query) && (
                    <span className="text-slate-400"> · 필터 적용됨</span>
                  )}
                </p>
                <div className="flex items-center gap-2 text-xs">
                  <span className="text-slate-400">정렬</span>
                  <select className="bg-white border border-gray-200 rounded-lg px-3 py-1.5 text-slate-700 focus:outline-none focus:border-[#1B4FD8]">
                    <option>유사도 순</option>
                    <option>과실 비율 높은 순</option>
                    <option>과실 비율 낮은 순</option>
                  </select>
                </div>
              </div>

              {/* Active filter chips */}
              {(types.length > 0 || range[0] !== 0 || range[1] !== 100) && (
                <div className="flex flex-wrap items-center gap-2">
                  {types.map((id) => (
                    <span key={id} className="inline-flex items-center gap-1.5 text-xs bg-blue-50 text-[#1B4FD8] border border-[#1B4FD8]/20 rounded-full px-2.5 py-1">
                      {{
                        straight:"직진/직진", left:"직진/좌회전", lane:"차선 변경",
                        rear:"추돌", park:"주차장", ped:"보행자", signal:"신호 위반",
                      }[id]}
                      <button onClick={() => toggleType(id)} className="hover:opacity-70">
                        <IconX className="w-3 h-3" stroke={2.5} />
                      </button>
                    </span>
                  ))}
                  {(range[0] !== 0 || range[1] !== 100) && (
                    <span className="inline-flex items-center gap-1.5 text-xs bg-blue-50 text-[#1B4FD8] border border-[#1B4FD8]/20 rounded-full px-2.5 py-1">
                      {range[0]}% ~ {range[1]}%
                      <button onClick={() => setRange([0, 100])} className="hover:opacity-70">
                        <IconX className="w-3 h-3" stroke={2.5} />
                      </button>
                    </span>
                  )}
                </div>
              )}

              {/* Result cards */}
              {results.length > 0 ? (
                <div className="grid sm:grid-cols-2 gap-4">
                  {results.map((c) => (
                    <CaseCard key={c.code} c={c} onOpen={setActive} />
                  ))}
                </div>
              ) : (
                <div className="bg-white border border-dashed border-gray-300 rounded-xl py-16 text-center">
                  <div className="mx-auto w-12 h-12 rounded-full bg-slate-100 text-slate-400 flex items-center justify-center mb-3">
                    <IconSearch className="w-5 h-5" />
                  </div>
                  <p className="text-sm font-bold text-slate-700">조건에 맞는 사례가 없습니다</p>
                  <p className="text-xs text-slate-500 mt-1">필터를 조정하거나 검색어를 변경해 보세요.</p>
                  <button onClick={reset} className="mt-4 text-xs font-medium text-[#1B4FD8] hover:underline">
                    필터 초기화
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>
      </main>

      {active && <CaseModal case={active} onClose={() => setActive(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
