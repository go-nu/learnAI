<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- BottomNavBar -->
<nav th:fragment="bottomNavBar(activePage)" class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-base py-stack-sm bg-surface/80 dark:bg-surface/80 backdrop-blur-md rounded-t-xl shadow-lg border-t border-outline-variant/30">
<a class="flex flex-col items-center justify-center active:scale-90 duration-200 transition-colors"
   th:classappend="${activePage == 'home'} ? 'text-primary dark:text-primary-fixed-dim font-bold' : 'text-on-surface-variant hover:bg-surface-container-low/50'"
   href="/">
<span th:if="${activePage == 'home'}" class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
<span th:unless="${activePage == 'home'}" class="material-symbols-outlined">home</span>
<span class="font-label-sm text-label-sm">홈</span>
</a>
<a class="flex flex-col items-center justify-center active:scale-90 duration-200 transition-colors"
   th:classappend="${activePage == 'weekly'} ? 'text-primary dark:text-primary-fixed-dim font-bold' : 'text-on-surface-variant hover:bg-surface-container-low/50'"
   href="/weekly">
<span th:if="${activePage == 'weekly'}" class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">calendar_today</span>
<span th:unless="${activePage == 'weekly'}" class="material-symbols-outlined">calendar_today</span>
<span class="font-label-sm text-label-sm">일별웹툰</span>
</a>
<a class="flex flex-col items-center justify-center active:scale-90 duration-200 transition-colors"
   th:classappend="${activePage == 'search'} ? 'text-primary dark:text-primary-fixed-dim font-bold' : 'text-on-surface-variant hover:bg-surface-container-low/50'"
   href="/search">
<span th:if="${activePage == 'search'}" class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">search</span>
<span th:unless="${activePage == 'search'}" class="material-symbols-outlined">search</span>
<span class="font-label-sm text-label-sm">검색</span>
</a>
<a class="flex flex-col items-center justify-center active:scale-90 duration-200 transition-colors"
   th:classappend="${activePage == 'storage'} ? 'text-primary dark:text-primary-fixed-dim font-bold' : 'text-on-surface-variant hover:bg-surface-container-low/50'"
   href="/storage">
<span th:if="${activePage == 'storage'}" class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">inventory_2</span>
<span th:unless="${activePage == 'storage'}" class="material-symbols-outlined">inventory_2</span>
<span class="font-label-sm text-label-sm">북마크</span>
</a>
<a class="flex flex-col items-center justify-center active:scale-90 duration-200 transition-colors"
   th:classappend="${activePage == 'my'} ? 'text-primary dark:text-primary-fixed-dim font-bold' : 'text-on-surface-variant hover:bg-surface-container-low/50'"
   href="/mypage">
<span th:if="${activePage == 'my'}" class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span th:unless="${activePage == 'my'}" class="material-symbols-outlined">person</span>
<span class="font-label-sm text-label-sm">마이페이지</span>
</a>
</nav>
</body>
</html>
