<!DOCTYPE html>
<html class="light" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>WEBTOON - 마이페이지</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "surface-container-high": "#e7e8eb",
            "on-secondary": "#ffffff",
            "surface-container-lowest": "#ffffff",
            "surface-variant": "#e1e2e5",
            "surface-container-highest": "#e1e2e5",
            "on-secondary-fixed-variant": "#004e5f",
            "on-secondary-container": "#005a6e",
            "on-surface": "#191c1e",
            "on-error-container": "#93000a",
            "surface-container-low": "#f2f4f6",
            "primary-fixed-dim": "#1ee46b",
            "secondary-fixed": "#b4ebff",
            "primary-container": "#00dc64",
            "surface": "#f8f9fc",
            "on-primary-fixed": "#002109",
            "outline-variant": "#bacbb8",
            "primary": "#006e2e",
            "secondary-container": "#40d7fe",
            "on-tertiary": "#ffffff",
            "inverse-on-surface": "#eff1f3",
            "on-error": "#ffffff",
            "on-primary-fixed-variant": "#005321",
            "on-surface-variant": "#3c4a3c",
            "surface-bright": "#f8f9fc",
            "on-primary-container": "#005a25",
            "on-primary": "#ffffff",
            "error": "#ba1a1a",
            "secondary-fixed-dim": "#40d7fe",
            "on-background": "#191c1e",
            "secondary": "#00677d",
            "on-secondary-fixed": "#001f27",
            "outline": "#6c7b6b",
            "inverse-surface": "#2e3133",
            "on-tertiary-fixed-variant": "#8e1300",
            "background": "#f8f9fc",
            "on-tertiary-fixed": "#3e0400",
            "on-tertiary-container": "#9b1600",
            "surface-tint": "#006e2e",
            "surface-container": "#eceef0",
            "tertiary-fixed": "#ffdad3",
            "surface-dim": "#d8dadd",
            "primary-fixed": "#67ff8d",
            "inverse-primary": "#1ee46b",
            "tertiary": "#ba1c00",
            "error-container": "#ffdad6",
            "tertiary-container": "#ffaa99",
            "tertiary-fixed-dim": "#ffb4a5"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "spacing": {
            "margin-desktop": "24px",
            "base": "4px",
            "gutter": "12px",
            "margin-mobile": "16px",
            "stack-lg": "24px",
            "stack-sm": "8px",
            "stack-md": "16px"
          },
          "fontFamily": {
            "headline-lg": ["Be Vietnam Pro"],
            "body-md": ["Be Vietnam Pro"],
            "display-lg": ["Be Vietnam Pro"],
            "headline-lg-mobile": ["Be Vietnam Pro"],
            "body-lg": ["Be Vietnam Pro"],
            "title-md": ["Be Vietnam Pro"],
            "label-sm": ["Be Vietnam Pro"]
          },
          "fontSize": {
            "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
            "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
            "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
            "headline-lg-mobile": ["20px", {"lineHeight": "28px", "fontWeight": "700"}],
            "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
            "title-md": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
            "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "600"}]
          }
        },
      },
    }
  </script>
<style>
    body { font-family: 'Be Vietnam Pro', sans-serif; background-color: #f8f9fc; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    body { min-height: max(884px, 100dvh); }
  </style>
</head>
<body class="bg-surface text-on-surface pb-32">

<!-- TopAppBar -->
<header th:replace="~{webtoon/inc_head :: topAppBar}"></header>

<main class="max-w-[600px] mx-auto px-margin-mobile">

  <!-- 프로필 카드 -->
  <section class="mt-stack-lg bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/20 p-stack-lg">
    <div class="flex items-center gap-stack-md">
      <div class="w-20 h-20 rounded-full bg-primary flex items-center justify-center shadow-md flex-shrink-0">
        <span class="material-symbols-outlined text-white text-[40px]" style="font-variation-settings: 'FILL' 1;">person</span>
      </div>
      <div class="flex-1">
        <h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">웹툰 독자</h2>
        <p class="font-body-md text-body-md text-on-surface-variant mt-1">reader@webtoon.com</p>
        <span class="inline-block mt-2 bg-primary-container text-on-primary-container font-label-sm text-label-sm px-3 py-1 rounded-full">일반 회원</span>
      </div>
      <button class="p-2 hover:bg-surface-variant/50 rounded-full transition-colors">
        <span class="material-symbols-outlined text-on-surface-variant">edit</span>
      </button>
    </div>
  </section>

  <!-- 활동 통계 -->
  <section class="mt-stack-md grid grid-cols-3 gap-gutter">
    <div class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/20 p-stack-md flex flex-col items-center gap-base">
      <span class="font-display-lg text-display-lg text-primary">24</span>
      <span class="font-label-sm text-label-sm text-on-surface-variant text-center">북마크</span>
    </div>
    <div class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/20 p-stack-md flex flex-col items-center gap-base">
      <span class="font-display-lg text-display-lg text-primary">138</span>
      <span class="font-label-sm text-label-sm text-on-surface-variant text-center">읽은 화수</span>
    </div>
    <div class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/20 p-stack-md flex flex-col items-center gap-base">
      <span class="font-display-lg text-display-lg text-primary">7</span>
      <span class="font-label-sm text-label-sm text-on-surface-variant text-center">댓글</span>
    </div>
  </section>

  <!-- 최근 읽은 웹툰 -->
  <section class="mt-stack-lg">
    <h3 class="font-headline-lg-mobile text-headline-lg-mobile mb-stack-md">최근 읽은 웹툰</h3>
    <div class="flex gap-gutter overflow-x-auto pb-2" style="-ms-overflow-style:none; scrollbar-width:none;">
      <div class="flex flex-col gap-base flex-shrink-0 w-24 cursor-pointer group">
        <div class="w-24 h-32 rounded-lg overflow-hidden bg-surface-container shadow-sm border border-black/5">
          <div class="w-full h-full bg-gradient-to-br from-primary-container to-primary flex items-center justify-center">
            <span class="material-symbols-outlined text-white text-[32px]">auto_stories</span>
          </div>
        </div>
        <p class="font-label-sm text-label-sm text-on-surface truncate text-center">Shadow Monarch</p>
      </div>
      <div class="flex flex-col gap-base flex-shrink-0 w-24 cursor-pointer group">
        <div class="w-24 h-32 rounded-lg overflow-hidden bg-surface-container shadow-sm border border-black/5">
          <div class="w-full h-full bg-gradient-to-br from-secondary-container to-secondary flex items-center justify-center">
            <span class="material-symbols-outlined text-white text-[32px]">auto_stories</span>
          </div>
        </div>
        <p class="font-label-sm text-label-sm text-on-surface truncate text-center">Neon Chronicles</p>
      </div>
      <div class="flex flex-col gap-base flex-shrink-0 w-24 cursor-pointer group">
        <div class="w-24 h-32 rounded-lg overflow-hidden bg-surface-container shadow-sm border border-black/5">
          <div class="w-full h-full bg-gradient-to-br from-tertiary-container to-tertiary flex items-center justify-center">
            <span class="material-symbols-outlined text-white text-[32px]">auto_stories</span>
          </div>
        </div>
        <p class="font-label-sm text-label-sm text-on-surface truncate text-center">Wind Breaker</p>
      </div>
      <div class="flex flex-col gap-base flex-shrink-0 w-24 cursor-pointer group">
        <div class="w-24 h-32 rounded-lg overflow-hidden bg-surface-container shadow-sm border border-black/5">
          <div class="w-full h-full bg-gradient-to-br from-surface-container-high to-outline flex items-center justify-center">
            <span class="material-symbols-outlined text-white text-[32px]">auto_stories</span>
          </div>
        </div>
        <p class="font-label-sm text-label-sm text-on-surface truncate text-center">The Boxer</p>
      </div>
    </div>
  </section>

  <!-- 설정 메뉴 -->
  <section class="mt-stack-lg mb-stack-lg">
    <h3 class="font-headline-lg-mobile text-headline-lg-mobile mb-stack-md">설정</h3>
    <div class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/20 divide-y divide-outline-variant/10">

      <button class="w-full flex items-center justify-between px-stack-md py-4 hover:bg-surface-container-low transition-colors group">
        <div class="flex items-center gap-stack-md">
          <span class="material-symbols-outlined text-primary">notifications</span>
          <span class="font-body-lg text-body-lg text-on-surface">알림 설정</span>
        </div>
        <span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors">chevron_right</span>
      </button>

      <button class="w-full flex items-center justify-between px-stack-md py-4 hover:bg-surface-container-low transition-colors group">
        <div class="flex items-center gap-stack-md">
          <span class="material-symbols-outlined text-primary">lock</span>
          <span class="font-body-lg text-body-lg text-on-surface">개인정보 보호</span>
        </div>
        <span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors">chevron_right</span>
      </button>

      <button class="w-full flex items-center justify-between px-stack-md py-4 hover:bg-surface-container-low transition-colors group">
        <div class="flex items-center gap-stack-md">
          <span class="material-symbols-outlined text-primary">palette</span>
          <span class="font-body-lg text-body-lg text-on-surface">테마 설정</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="font-label-sm text-label-sm text-on-surface-variant">라이트</span>
          <span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors">chevron_right</span>
        </div>
      </button>

      <button class="w-full flex items-center justify-between px-stack-md py-4 hover:bg-surface-container-low transition-colors group">
        <div class="flex items-center gap-stack-md">
          <span class="material-symbols-outlined text-primary">help</span>
          <span class="font-body-lg text-body-lg text-on-surface">고객센터</span>
        </div>
        <span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors">chevron_right</span>
      </button>

      <button class="w-full flex items-center justify-between px-stack-md py-4 hover:bg-surface-container-low transition-colors group">
        <div class="flex items-center gap-stack-md">
          <span class="material-symbols-outlined text-primary">info</span>
          <span class="font-body-lg text-body-lg text-on-surface">앱 정보</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="font-label-sm text-label-sm text-on-surface-variant">v1.0.0</span>
          <span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors">chevron_right</span>
        </div>
      </button>

    </div>
  </section>

  <!-- 로그아웃 버튼 -->
  <section class="mb-stack-lg">
    <button class="w-full py-4 rounded-xl border border-error text-error font-title-md text-title-md hover:bg-error/5 transition-colors flex items-center justify-center gap-2">
      <span class="material-symbols-outlined">logout</span>
      로그아웃
    </button>
  </section>

</main>

<!-- BottomNavBar -->
<nav th:replace="~{webtoon/inc_foot :: bottomNavBar('my')}"></nav>

</body>
</html>
